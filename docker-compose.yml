version: '3.9'

services:
  app:
    build:
      context: ./app
      dockerfile: ../Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - orgdesk_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orgdesk
      POSTGRES_PASSWORD: orgdesk123
      POSTGRES_DB: orgdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgdesk"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - orgdesk_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - orgdesk_net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: orgdesk
      MINIO_ROOT_PASSWORD: orgdesk123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - orgdesk_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  orgdesk_net:
    driver: bridge
